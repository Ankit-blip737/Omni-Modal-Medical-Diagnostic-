# ═══════════════════════════════════════════════════════════════
#  Omni-Modal Diagnostic Framework — Default Configuration
# ═══════════════════════════════════════════════════════════════

# ─── Training Hyperparameters (3-Phase Curriculum) ───
training:
  # Phase 1: Contrastive Pre-training
  # Only trains alignment module (projection heads + temperature)
  phase1:
    epochs: 50
    batch_size: 256        # Large batch for contrastive learning
    lr: 1.0e-4
    weight_decay: 1.0e-4
    warmup_epochs: 5

  # Phase 2: Fusion Training
  # Unfreezes LoRA + branches, trains fusion engine + classifier
  phase2:
    epochs: 100
    batch_size: 32
    lr: 5.0e-5
    weight_decay: 1.0e-4
    warmup_epochs: 10
    lambda_align: 0.1      # Weight for contrastive alignment loss

  # Phase 3: End-to-End Fine-tuning
  # Very low LR on all parameters
  phase3:
    epochs: 20
    batch_size: 16
    lr: 1.0e-6
    weight_decay: 1.0e-5
    warmup_epochs: 3
    lambda_align: 0.05

  # General training settings
  gradient_clip_norm: 1.0
  mixed_precision: true
  seed: 42
  log_every_n_steps: 50
  val_every_n_epochs: 1

# ─── Model Architecture ───
model:
  num_modalities: 1          # 1 for X-ray, 3 for MRI (T1/T2/FLAIR)
  num_classes: 14            # 14 for CheXpert, 3 for BraTS
  text_model: pubmedbert     # pubmedbert | biobert | clinicalbert
  freeze_image_backbone: true
  freeze_text_layers: 8      # Freeze first 8 of 12 BioBERT layers
  lora_rank: 8               # LoRA rank for text encoder fine-tuning
  lora_alpha: 16.0
  fusion_dim: 768
  projection_dim: 256        # Contrastive alignment space dimension
  num_fusion_stages: 1       # Number of fine-grained fusion stages
  modality_dropout_p: 0.15   # Probability of dropping a modality during training
  multi_label: true          # true for multi-label, false for single-label

# ─── Data Configuration ───
data:
  dataset: mimic_cxr         # mimic_cxr | brats
  root_dir: ./data/mimic-cxr
  image_size: 224
  max_text_length: 512
  num_workers: 4
  pin_memory: true
  batch_size: 32

# ─── Logging & Checkpoints ───
logging:
  log_dir: ./logs
  checkpoint_dir: ./checkpoints
  log_every_n_steps: 50
  val_every_n_epochs: 1
  use_wandb: false
  wandb_project: omni-modal-diagnostic
